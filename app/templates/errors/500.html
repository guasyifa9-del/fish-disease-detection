{% extends 'base.html' %}

{% block title %}500 — Kesalahan Server{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 text-center py-5">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
        </div>
        <h1 class="display-4 fw-bold text-dark">500</h1>
        <h4 class="fw-semibold mb-3">Kesalahan Internal Server</h4>
        <p class="text-muted mb-4">
            Maaf, terjadi kesalahan pada server kami.
            Tim kami sedang bekerja untuk memperbaikinya.
            Silakan coba lagi dalam beberapa saat.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                <i class="bi bi-house-door me-1"></i> Kembali ke Beranda
            </a>
            <button onclick="location.reload()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-clockwise me-1"></i> Coba Lagi
            </button>
        </div>
    </div>
</div>
{% endblock %}
